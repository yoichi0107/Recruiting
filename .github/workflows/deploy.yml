name: Deploy Culture Deck LP to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp .nojekyll _site/
          cp -r assets _site/

      # 安全弁: 機密の Culture Deck PDF など、PDF が成果物に混入していたら公開を中止する
      - name: Guard — ensure no PDF is published
        run: |
          if find _site -iname '*.pdf' | grep -q .; then
            echo "::error::PDF file found in deploy artifact. Aborting (Culture Deck PDF must not be published)."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # リポジトリで Pages が未有効でも、ここで自動的に
          # GitHub Actions ビルドとして有効化する
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
